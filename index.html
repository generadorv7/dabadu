<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:url("https://imgur.com/vKv4xeD.png") center center no-repeat;
background-size:cover;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
color:white;
min-height:100vh;
}

.page{
max-width:420px;
width:100%;
padding:20px;
text-align:center;
background:rgba(0,0,0,0.75);
border:2px solid #00FFFF;
border-radius:10px;
margin:20px;
}

h1{
color:#00FFFF;
font-size:22px;
margin-bottom:5px;
}

.subtitle{
color:#00FFFF;
font-size:16px;
font-weight:bold;
letter-spacing:1px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.item{
border:2px solid #444;
border-radius:12px;
overflow:hidden;
cursor:pointer;
background:#000;
transition:0.2s;
}

.item img{
width:100%;
display:block;
}

.item:hover{
transform:scale(1.03);
}

.selected{
border-color:#00FFFF;
box-shadow:0 0 10px #00FFFF;
}

button{
margin-top:20px;
padding:12px 30px;
background:linear-gradient(45deg,#ff7a00,#00FFFF);
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

.btnRegalo{
margin-top:15px;
padding:12px 30px;
background:#7b2cff;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
font-size:16px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

.icono{
width:18px;
height:18px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:flex-start;
overflow-y:auto;
padding-top:50px;
}

.popupBox{
background:#1c1c1c;
padding:20px;
border-radius:12px;
width:320px;
border:2px solid #00ffff;
}

input{
width:90%;
padding:12px;
border-radius:8px;
border:2px solid #00ffff;
background:#111;
color:white;
font-size:16px;
}

.loading{
display:none;
margin-top:20px;
}

.spinner{
width:40px;
height:40px;
border:4px solid #333;
border-top:4px solid #00ffff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="page">

<h1>DIAMONDS GENERATOR</h1>
<div class="subtitle">SELECCIONAR:</div>

<div class="grid">

<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/clJRDLG.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/4ntPoEL.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/6bEkvzW.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/vIU0orN.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/LK3wBNN.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/prFZpiS.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/8XlgTcq.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/ty5Modj.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/tMg1kAA.png"></div>
<div class="item" onclick="selectItem(this)"><img src="https://imgur.com/sf0uEgh.png"></div>

</div>

<button id="btn" disabled onclick="openPopup()" class="btnRegalo">
<img src="https://imgur.com/xFFmJrZ.png" class="icono">
</button>

</div>

<div class="popup" id="popup">

<div class="popupBox">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
<h3 style="margin:0;">INGRESA ID DEL JUGADOR</h3>
<span onclick="cerrarPopup()" style="cursor:pointer;font-size:22px;color:#00FFFF;">✕</span>
</div>

<input id="playerID" placeholder="Ingresa el ID">

<br><br>

<button onclick="send()">ENVIAR</button>

<div class="loading" id="loading">

<p>Procesando...</p>

<div class="spinner"></div>

</div>

<div id="result"></div>

</div>

</div>

<script>

let selectedImgs=[]

function selectItem(el){

let img = el.querySelector("img").src

el.classList.toggle("selected")

if(selectedImgs.includes(img)){
selectedImgs = selectedImgs.filter(i => i !== img)
}else{
selectedImgs.push(img)
}

document.getElementById("btn").disabled = selectedImgs.length === 0

}

function openPopup(){

document.getElementById("popup").style.display="flex"

}

function send(){

let id=document.getElementById("playerID").value

if(id.length<5){
alert("ID INVALIDO")
return
}

document.getElementById("loading").style.display="block"

setTimeout(()=>{

document.getElementById("loading").style.display="none"

let imgs = ""

selectedImgs.forEach(img=>{
imgs += "<img src='"+img+"' width='90' style='margin:5px;border-radius:8px;border:2px solid #00FFFF;'>"
})

document.getElementById("result").innerHTML =
"<br>"+imgs+"<p style='color:#00FFFF;font-size:18px;font-weight:bold;margin-top:15px;'>Listo tus recompensas seleccionadas llegaran en un plazo maximo de 48 Horas.</p>";
},2000)

}

function volver(){

document.getElementById("popup").style.display="none"

document.getElementById("loading").style.display="none"

document.getElementById("result").innerHTML=""

document.getElementById("playerID").value=""

selectedImgs=[]

document.querySelectorAll(".item").forEach(i=>{
i.classList.remove("selected")
})

document.getElementById("btn").disabled=true

}

function cerrarPopup(){

document.getElementById("popup").style.display="none"

document.getElementById("loading").style.display="none"

document.getElementById("result").innerHTML=""

document.getElementById("playerID").value=""

}

</script>

</body>

</html>
